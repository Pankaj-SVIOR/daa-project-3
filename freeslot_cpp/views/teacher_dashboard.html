<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Teacher Dashboard — FreeSlot Finder</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

  <style>
    :root {
      --accent: #4f46e5;
      --accent-2: #06b6d4;
    }
    body{
      margin:0; font-family: "Inter"; 
      background: linear-gradient(180deg,#041023 0%, #071025 60%);
      color: #e6eef8;
    }
    .page-wrap { padding:96px 20px 48px; max-width:1200px; margin:auto; }
    .topbar {
      position: fixed; left:20px; right:20px; top:18px; z-index:60;
      background: rgba(255,255,255,0.06); padding:14px 18px;
      display:flex; justify-content:space-between; align-items:center;
      border-radius:12px; backdrop-filter:blur(8px);
    }
    .logo-badge { width:44px;height:44px;background:linear-gradient(135deg,var(--accent),var(--accent-2));
      border-radius:10px;display:flex;align-items:center;justify-content:center;color:white;font-weight:700;}
    .card { background:white; color:#0f172a; padding:18px; border-radius:12px; }
    .select,.input{width:100%;padding:10px;border-radius:10px;border:1px solid #ccc;}
    select, .select { background-color:#ffffff !important; color:#1f2937 !important; font-weight:600 !important; }
    option { color:#1f2937 !important; background:white !important; font-weight:600; }
    .btn{padding:10px 14px;border-radius:10px;font-weight:600;cursor:pointer;border:none;}
    .btn-primary{background:linear-gradient(90deg,var(--accent),#8b5cf6);color:white;}
    .room-item{padding:10px;border-radius:10px;background:white;border:1px solid #ddd;cursor:pointer;}
    .room-item.selected{border:2px solid #4f46e5;}
  </style>
</head>

<body>

  <!-- NAV -->
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:12px">
      <div class="logo-badge">FS</div>
      <div>
        <div style="font-weight:700;font-size:1.05rem">Teacher Dashboard</div>
        <div style="font-size:0.85rem;opacity:0.75">FreeSlot — Manage classrooms & bookings</div>
      </div>
    </div>

    <div style="display:flex;align-items:center;gap:10px">
      <!-- Weekly Schedule Button -->
      <button 
        onclick="window.location.href='/weekly-schedule'" 
        class="px-4 py-2 rounded-lg bg-blue-500 text-white font-semibold hover:bg-blue-600 transition">
        📅 Weekly Schedule
      </button>

      <!-- Teacher select dropdown -->
      <select id="teacherSelect" class="select" style="width:220px;"></select>
    </div>
  </div>

  <!-- PAGE -->
  <div class="page-wrap">

    <h1 class="text-3xl font-bold mb-4 text-white">Teacher Dashboard</h1>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

      <!-- Today's Classes -->
      <div class="card">
        <div class="font-bold text-lg">📘 Today's Classes</div>
        <div id="todayClasses" style="margin-top:12px;">Loading…</div>
      </div>

      <!-- Free Rooms -->
      <div class="card">
        <div class="font-bold text-lg">🏫 Free Room Finder</div>

        <select id="slotSelect" class="select mt-3">
          <option>08:00-08:55</option>
          <option>08:55-09:50</option>
          <option>10:10-11:05</option>
          <option>11:05-12:00</option>
          <option>12:00-12:55</option>
          <option>12:55-01:50</option>
          <option>02:10-03:05</option>
          <option>03:05-04:00</option>
          <option>04:00-04:55</option>
        </select>

        <button onclick="findFreeRooms()" class="btn btn-primary w-full mt-3">🔍 Show Free Rooms</button>
        <div id="freeRooms" class="mt-4">No selection</div>
      </div>

      <!-- Book Room -->
      <div class="card">
        <div class="font-bold text-lg">📝 Book Room</div>

        <input id="bookDate" type="date" class="input mt-3">
        <input id="selectedRoom" class="input mt-3" placeholder="Click a free room">

        <button onclick="bookRoom()" class="btn btn-primary w-full mt-4">✔ Book Now</button>
        <div id="bookMsg" class="mt-2 text-green-700 font-semibold"></div>

        <button onclick="undoLast()" class="btn mt-4 w-full" style="background:#f97316;color:white;">↩ Undo Last</button>
        <div id="undoMsg" class="mt-2 text-red-600 font-semibold"></div>
      </div>

    </div>

    <!-- Recent Activity -->
    <h2 class="text-xl font-bold text-white mt-10 mb-3">Activity Timeline</h2>

    <div class="card">
      <div id="recentActivity" class="grid grid-cols-1 md:grid-cols-3 gap-3">Loading…</div>
    </div>

  </div>

<script>
// NOTE: In C++ version, teacher_id is read from URL param (no Jinja2 templating)
// Get teacher_id from URL param, e.g. /teacher_dashboard?teacher_id=1
function getUrlParam(name) {
  const params = new URLSearchParams(window.location.search);
  return params.get(name);
}

let teacherID = getUrlParam("teacher_id") || 1;

const teacherSelect = document.getElementById("teacherSelect");
const todayBox = document.getElementById("todayClasses");
const freeRoomsBox = document.getElementById("freeRooms");
const recentWrap = document.getElementById("recentActivity");

/* load teachers */
fetch('/teachers')
  .then(r => r.json())
  .then(data => {
    teacherSelect.innerHTML = "";
    data.forEach(t => {
      const opt = document.createElement("option");
      opt.value = t.teacher_id;
      opt.textContent = t.name;
      teacherSelect.appendChild(opt);
    });
    teacherSelect.value = teacherID;
    loadTodayClasses();
    loadRecentActivity();
  });

teacherSelect.addEventListener("change", () => {
  teacherID = teacherSelect.value;
  loadTodayClasses();
});

/* today classes */
function loadTodayClasses(){
  todayBox.innerHTML = "Loading…";
  fetch(`/teacher_classes_today/${teacherID}`)
    .then(r => r.json())
    .then(data => {
      todayBox.innerHTML = "";
      if (data.length === 0) {
        todayBox.innerHTML = "No classes today 🎉";
        return;
      }
      data.forEach(c => {
        todayBox.innerHTML += `
        <div class="p-3 bg-gray-100 rounded-lg border">
          <b>${c.slot}</b> — ${c.subject}<br>
          Room: ${c.room}
        </div>`;
      });
    });
}

/* free rooms */
function findFreeRooms() {
  const slot = document.getElementById("slotSelect").value;
  freeRoomsBox.innerHTML = "Searching…";

  fetch("/free_rooms_today")
    .then(r => r.json())
    .then(data => {
      freeRoomsBox.innerHTML = "";
      const item = data.find(x => x.slot === slot);

      if (!item || item.free_rooms.length === 0) {
        freeRoomsBox.innerHTML = "No free rooms found";
        return;
      }

      item.free_rooms.forEach(room => {
        const div = document.createElement("div");
        div.className = "room-item";
        div.textContent = room;

        div.onclick = () => {
          document.querySelectorAll(".room-item").forEach(r => r.classList.remove("selected"));
          div.classList.add("selected");
          document.getElementById("selectedRoom").value = room;
        };

        freeRoomsBox.appendChild(div);
      });
    });
}

/* book */
function bookRoom() {
  const date = document.getElementById("bookDate").value;
  const room = document.getElementById("selectedRoom").value;
  const slot = document.getElementById("slotSelect").value;

  fetch('/book_room', {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({ teacher_id: teacherID, room_id: room, date, slot })
  })
  .then(r=>r.json())
  .then(d=>{
    document.getElementById("bookMsg").textContent = d.message;
    loadRecentActivity();
  });
}

/* undo */
function undoLast(){
  fetch("/undo_booking",{method:"POST"})
    .then(r=>r.json())
    .then(d=>{
      document.getElementById("undoMsg").textContent = d.message;
      loadRecentActivity();
    });
}

/* activity */
function loadRecentActivity(){
  recentWrap.innerHTML = "Loading…";

  fetch("/today_bookings")
    .then(r => r.json())
    .then(data => {
      recentWrap.innerHTML = "";
      if (data.length === 0) {
        recentWrap.innerHTML = "No recent activity";
        return;
      }

      data.forEach(b => {
        recentWrap.innerHTML += `
          <div class="p-3 bg-gray-100 border rounded-lg">
            <div>${b.date} — ${b.slot}</div>
            <div class="font-bold">${b.teacher}</div>
            <div>${b.room}</div>
          </div>`;
      });
    });
}

/* midnight auto refresh */
function scheduleMidnightRefresh() {
  const now = new Date();
  const nextMidnight = new Date();
  nextMidnight.setHours(24, 0, 0, 0);
  const timeUntilMidnight = nextMidnight - now;
  setTimeout(() => {
    loadRecentActivity();
    scheduleMidnightRefresh();
  }, timeUntilMidnight);
}

scheduleMidnightRefresh();
</script>

</body>
</html>
