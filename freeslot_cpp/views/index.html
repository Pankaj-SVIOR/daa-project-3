<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Teacher Free Slot Finder</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    .glass {
      background: rgba(255, 255, 255, 0.18);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.25);
    }
  </style>
</head>

<body class="font-sans bg-gray-100">

  <!-- TOP BAR -->
  <div class="bg-orange-500 text-white text-center py-2 text-sm font-semibold">
    TEACHER FREE SLOT FINDING SYSTEM 
  </div>

  <div class="relative w-full h-screen">
    <img 
      src="https://images.unsplash.com/photo-1522071820081-009f0129c71c?auto=format&w=1600&q=80"
      class="w-full h-full object-cover brightness-50">

    <div class="absolute inset-0 flex flex-col justify-center items-center text-center text-white px-6">

      <h1 class="text-5xl font-bold drop-shadow-xl">
        Smart Classroom Availability System
      </h1>

      <p class="text-2xl mt-4 max-w-2xl drop-shadow">
        Instantly check free rooms, book slots, and manage teaching schedules efficiently.
      </p>

      <div class="mt-10 flex gap-6">
        <a href="/teacher_dashboard" class="glass px-10 py-4 rounded-lg text-xl font-semibold hover:bg-white/25 transition">Dashboard</a>
      </div>

    </div>
  </div>

</body>
</html>
